<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Exemplo de formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados pessoais</legend>
            <div>
                <label for="imail">Email: </label>
                <input type="email" name="mail" id="imail" required autocomplete="email">
            </div>
            <div>
                <label for="itel">Telefone: </label>
                <input type="tel" name="tele" id="itel" autocomplete="tel" required
                pattern="^\(\d{2}\)\d{4 , 5}-\d{5}$" placeholder="(xx)xxxx-xxxx">
            </div>
            <!-- Estudar mas sobre RegEx! exemplo de expressões regulares acima em pattern -->
            <div>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </div>
        </fieldset>
    </form>
</body>
</html>
