<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Meu primeiro formulário.</h1>
    <!-- ao utilizar o action na tag form voce estara enviando as informações prenchidas para determinado lugar ao clicar em submit. -->
    <form action="cadastro.php" autocomplete="off">
        <!-- A tag label serve para relacionar a caixa de input com o item presente dentro de label, nesse caso como utilizamos o label no item "Nome:", ele sera relacionado ao input por conta do id inome -->
        <p><label for="inome">Nome: </label>
            <input type="text" name="nome" id="inome">
        </p>
        <p><label for="isobrenome">Sobrenome: </label>
            <input type="text" name="sobrenome" id="isobrenome">
        </p>
        <input type="submit" value="Enviar">
    </form>
</body>
</html>
