<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 300px;
        }

        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de células</h1>
    <table>
        <tr>
            <!-- expansão em coluna -->
            <td>A</td>
            <td colspan="2">B</td>
        </tr>
        <tr>
            <!-- expansão em linha -->
            <td rowspan="3">D</td>
            <td>E</td>
            <td>F</td>
            <!-- ao apagar uma coluna, caso haja outras colunas adiante elas vão ocupar o lugar desta coluna, mas isso não impede de usar a expansão em linha nos espaços que foram apagados -->
        </tr>
        <tr>
            <td>H</td>
            <td>I</td>
        </tr>
        <tr>
            <td>K</td>
            <td>L</td>
        </tr>
    </table>
</body>
</html>
