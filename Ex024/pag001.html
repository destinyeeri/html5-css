<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 450px;
        }

        th, td {
            border: 1px solid black;
            padding: 3px;
        }
        
        th.cor {
            background-color: rgb(111, 111, 111);
            color: white;
        }
        .alinhamento {
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th rowspan="2" scope="col" class="cor">Área</th>
                <th rowspan="2" scope="col" class="cor">Disciplinas</th>
                <th colspan="2" scope="colgroup" class="cor">Notas</th>
                <th rowspan="2" scope="col" class="cor">Média</th>
            </tr>
            <tr>
                <th class="cor" scope="col">Nota 1</th>
                <th class="cor" scope="col">Nota 2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th rowspan="4" scope="rowgroup">Exatas</th>
                <td>Matemática</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
            </tr>
            <tr>
                <td>Física</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
            </tr>
            <tr>
                <td>Química</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
            </tr>
            <tr>
                <td>Biologia</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
            </tr>
            <caption>
                <tr>
                    <th colspan="4" scope="row" class="cor" style="text-align: left;">Média de exatas</th>
                    <th class="cor">0.0</th>
                </tr>
            </caption>
            <tr>
                <th rowspan="2" scope="rowgroup">Humanas</th>
                <td>História</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
            </tr>
            <tr>
                <td>Geografia</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
                <td class="alinhamento">0.0</td>
            </tr>
            <caption>
                <tr>
                    <th colspan="4" scope="row" class="cor" style="text-align: left;">Média de humanas</th>
                    <th class="cor">0.0</th>
                </tr>
            </caption>
        </tbody>
    </table>
</body>
</html>
