<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="Estilos/style.css">
    <link rel="stylesheet" href="Estilos/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Bem vindo, para continuar preencha as informações abaixo.</p>
                <form action="Cadastro.php" method="post" autocomplete="on">
                    <div class="conteudo">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="mail" id="imail" autocomplete="email" required maxlength="30">
                        <label for="imail"></label>
                    </div>
                    <div class="conteudo">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="password" name="sen" id="isen" autocomplete="current-password" required minlength="8" maxlength="20" placeholder="">
                        <label for="isen"></label>
                    </div>
                    <input type="submit" value="Enviar">
                    <a href="esqueci.html" class="botao">Esqueci a senha <span class="material-symbols-outlined">mail</span></a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
